services:
  web:
    image: "ghcr.io/wabolabs/sparkcore/web:${IMAGE_TAG:-latest}"
    ports:
      - "5151:80"
    env_file:
      - resgrid.env
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.51
    depends_on:
      - api
      - events
      - db
      - redis
      - rabbitmq
      - worker
      - mongodb
    environment:
      - WAIT_HOSTS=db:1433,redis:6379,rabbitmq:15672,api:80,mongodb:27017
      - WAIT_TIMEOUT=300

  api:
    image: "ghcr.io/wabolabs/sparkcore/api:${IMAGE_TAG:-latest}"
    ports:
      - "5152:80"
    env_file:
      - resgrid.env
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.52
    depends_on:
      - events
      - db
      - redis
      - rabbitmq
      - worker
      - mongodb
    environment:
      - WAIT_HOSTS=db:1433,redis:6379,rabbitmq:15672,events:80,mongodb:27017
      - WAIT_TIMEOUT=300

  events:
    image: "ghcr.io/wabolabs/sparkcore/eventing:${IMAGE_TAG:-latest}"
    ports:
      - "5153:80"
    env_file:
      - resgrid.env
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.53
    depends_on:
      - db
      - redis
      - rabbitmq
    environment:
      - WAIT_HOSTS=db:1433,redis:6379,rabbitmq:15672
      - WAIT_AFTER=120
      - WAIT_TIMEOUT=300

  tts:
    image: "ghcr.io/wabolabs/sparkcore/tts:${IMAGE_TAG:-latest}"
    ports:
      - "5154:8080"
    env_file:
      - resgrid.env
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.60
    environment:
      - ASPNETCORE_URLS=http://+:8080

  mcp:
    image: "ghcr.io/wabolabs/sparkcore/mcp:${IMAGE_TAG:-latest}"
    ports:
      - "5155:8080"
    env_file:
      - resgrid.env
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.61
    depends_on:
      - db
      - redis
      - rabbitmq
      - mongodb
    environment:
      - WAIT_HOSTS=db:1433,redis:6379,rabbitmq:15672,mongodb:27017
      - WAIT_TIMEOUT=300
      - ASPNETCORE_URLS=http://+:8080

  worker:
    image: "ghcr.io/wabolabs/sparkcore/worker:${IMAGE_TAG:-latest}"
    env_file:
      - resgrid.env
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.54
    depends_on:
      - db
      - redis
      - rabbitmq
      - mongodb
    environment:
      - WAIT_HOSTS=db:1433,redis:6379,rabbitmq:15672,mongodb:27017
      - WAIT_AFTER=90
      - WAIT_TIMEOUT=180

  db:
    ports:
      - "5157:1433"
    networks:
      rgmain:
        ipv4_address: 172.16.193.55
    build: ./db
    environment:
      - SA_PASSWORD=Resgrid123!!
      - ACCEPT_EULA=Y
      - MSSQL_PID=Express
    volumes:
      - type: bind
        source: ./docker-data/sql/data
        target: /var/opt/mssql/data
      - type: bind
        source: ./docker-data/sql/log
        target: /var/opt/mssql/log
      - type: bind
        source: ./docker-data/sql/backup
        target: /var/opt/mssql/backup

  redis:
    image: "redis:alpine"
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "5158:6379"
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.56

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=resgrid
      - RABBITMQ_DEFAULT_PASS=Resgrid321!
    ports:
      - "5160:15672"
      - "5159:5672"
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.57

  elasticsearch:
    image: elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "5164:9200"
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.58
    volumes:
      - ./docker-data/elasticsearch:/usr/share/elasticsearch/data

  kibana:
    image: kibana:8.17.0
    ports:
      - "5163:5601"
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.62
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    restart: always
    networks:
      rgmain:
        ipv4_address: 172.16.193.59
    environment:
      - MONGO_INITDB_DATABASE=resgrid
      - MONGO_INITDB_ROOT_USERNAME=resgridUser
      - MONGO_INITDB_ROOT_PASSWORD=Resgrid123!!
    volumes:
      - ./mongo-entrypoint:/docker-entrypoint-initdb.d
      - ./docker-data/mongo/db:/data/configdb
      - ./docker-data/mongo/configdb:/data/db

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./docker-data/nginx:/etc/nginx/conf.d
      - ./docker-data/certbot/conf:/etc/letsencrypt
      - ./docker-data/certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./docker-data/certbot/conf:/etc/letsencrypt
      - ./docker-data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  rgmain:
    ipam:
      driver: default
      config:
        - subnet: 172.16.193.0/24
