# SparkOps Core CI/CD
# - PRs on any branch: build + test
# - Push to master: build + test + GHCR publish + GitHub Release

name: CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  # ───────────────────────────────────────────────
  # Build & Test — runs on every PR and push to master
  # ───────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

  # ───────────────────────────────────────────────
  # Docker Build & Push — only on push to master
  # Publishes to GitHub Container Registry (GHCR)
  # ───────────────────────────────────────────────
  docker-build-and-push:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/wabolabs/sparkcore/web
            dockerfile: Web/Resgrid.Web/Dockerfile
          - image: ghcr.io/wabolabs/sparkcore/api
            dockerfile: Web/Resgrid.Web.Services/Dockerfile
          - image: ghcr.io/wabolabs/sparkcore/eventing
            dockerfile: Web/Resgrid.Web.Eventing/Dockerfile
          - image: ghcr.io/wabolabs/sparkcore/mcp
            dockerfile: Web/Resgrid.Web.Mcp/Dockerfile
          - image: ghcr.io/wabolabs/sparkcore/tts
            dockerfile: Web/Resgrid.Web.Tts/Dockerfile
          - image: ghcr.io/wabolabs/sparkcore/worker
            dockerfile: Workers/Resgrid.Workers.Console/Dockerfile

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: version
      run: |
        VERSION="1.0.${{ github.run_number }}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ matrix.image }}
        tags: |
          type=raw,value=${{ steps.version.outputs.version }}
          type=raw,value=latest
          type=sha,prefix=

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        push: true
        build-args: BUILD_VERSION=${{ steps.version.outputs.version }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────
  # GitHub Release — created after all images push
  # ───────────────────────────────────────────────
  github-release:
    needs: docker-build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Extract version
      id: version
      run: |
        VERSION="1.0.${{ github.run_number }}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Get merged PR body for release notes
      id: pr-info
      uses: actions/github-script@v7
      with:
        script: |
          const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
          });
          const pr = prs.data.find(p => p.merged_at);
          const fs = require('fs');
          const body = pr ? (pr.body || '').trim() : '';
          fs.writeFileSync('release_notes.md', body || 'No release notes provided.');

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: SparkOps Core v${{ steps.version.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        make_latest: true
        fail_on_unmatched_files: false
